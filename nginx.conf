worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Cloudflare tunnels
    server {
        listen       80;
        server_name  www.goulielmos.org alex.goulielmos.org alexandros.goulielmos.org;
        include paths.conf;
    }

    # in the case we have a subdomain which forwards to https://localhost
    # it requires the "Origin Server Name" setting to be "agouliel.ddns.net"
    # this setting tells the tunnel:
    # "Even though the user typed subdomain.goulielmos.org in their browser,
    # when you connect to the machine, tell Nginx that you are looking for agouliel.ddns.net."
    # This "tricks" Nginx into matching the request to the existing HTTPS server block.
    # Nginx is configured with ssl_certificate fullchain.pem which is tied to the agouliel.ddns.net domain.

    # DNS (normal or dynamic)
    server {
        listen       80;
        server_name  agouliel.ddns.net goulielmos.org;
        location / {
          # redirect any requests to the same URL but on https
          return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen       443 ssl;
        server_name  agouliel.ddns.net goulielmos.org;
        ssl_certificate      fullchain.pem;
        ssl_certificate_key  key.pem;
        include paths.conf;
        client_max_body_size 20M;
    }

    # Subdomain
    server {
        listen       80;
        server_name  casino.goulielmos.org;
        location / {
          return 301 https://$host$request_uri;
        }
    }

    server {
        listen       443 ssl;
        server_name  casino.goulielmos.org;
        ssl_certificate      fullchain_casino.pem;
        ssl_certificate_key  key_casino.pem;
        location / {
            proxy_pass http://localhost:8016/;
        }
        client_max_body_size 20M;
    }

    include servers/*;
}
