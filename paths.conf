# ---------- MICROBLOG -----------

# https://stackoverflow.com/questions/53207059/react-nginx-routing-to-subdirectory
location ^~ /microblog {
    alias html/microblog;
    try_files $uri $uri/ /microblog/index.html;
}

location /static {
    root html/microblog/static;
    expires 1y;
    add_header Cache-Control "public";
}

# ---------- DJANGO ------------

location /django {
    proxy_pass http://localhost:8000;
}

location /djangostatic/ {
    alias /Users/Shared/src/www/djangostatic/;
    expires 1y;
    add_header Cache-Control "public";
}

location /media/media/ {
    alias /Users/Shared/src/www/media/;
    expires 1y;
    add_header Cache-Control "public";
}

